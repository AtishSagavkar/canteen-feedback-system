<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Canteen Feedback</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <nav class="top-nav">
    <a href="index.html" class="nav-link">Home</a>
    <a href="menu.html" class="nav-link">Menu</a>
    <a href="dashboard.html" class="nav-link active">Dashboard</a>
    <a href="contact.html" class="nav-link">Contact</a>
    <a href="how-it-works.html" class="nav-link">How It Works</a>
    <button id="themeToggle" class="theme-btn">Dark Mode</button>
  </nav>
  <h2 style="color:#fff; text-align:center; margin: 10px 0 20px;">🌟 Sunrise Canteen</h2>
  <h1>Admin Dashboard</h1>
  <p style="text-align:center; color:white;">This page shows average ratings and all feedback entries.</p>
  <div id="loginSection" style="margin-top:20px; text-align:center;">
    <div style="max-width:380px;margin:0 auto;background:#222;padding:16px;border-radius:10px;">
      <p style="margin-bottom:12px; color:#fff; font-weight:600;">Admin login is required to view dashboard data.</p>
      <input id="usernameInput" placeholder="Username" style="width:100%;padding:10px;margin-bottom:8px;border-radius:6px;border:1px solid #666;" />
      <input id="passwordInput" type="password" placeholder="Password" style="width:100%;padding:10px;margin-bottom:8px;border-radius:6px;border:1px solid #666;" />
      <button id="loginButton" style="width:100%;padding:10px;border:none;border-radius:6px;background:#4caf50;color:white;font-weight:600;cursor:pointer;">Login</button>
      <div id="loginMessage" style="margin-top:8px;color:#ffcccb;"></div>
    </div>
  </div>
  <div id="dashboardContent" style="margin-top:20px; color:white; display:none;"></div>
  <div id="dashboardFooter" style="margin-top:20px; text-align:center; display:none;"><a href="index.html" class="nav-link">Back to Feedback</a> <button id="logoutButton" style="margin-left:12px;padding:8px 14px;border:none;border-radius:6px;background:#f44336;color:#fff;font-weight:600;cursor:pointer;">Logout</button></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDKKKiJpenTXH9vXMDkU9-Ctop9iSif9DU",
  authDomain: "canteen-feedback-new-9c0e6.firebaseapp.com",
  projectId: "canteen-feedback-new-9c0e6",
  storageBucket: "canteen-feedback-new-9c0e6.firebasestorage.app",
  messagingSenderId: "835202234208",
  appId: "1:835202234208:web:5136609a75236996705005"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function renderDashboard() {
  const dash = document.getElementById("dashboardContent");
  dash.innerHTML = "<p>Loading...</p>";

  let data = [];
  try {
    const snap = await getDocs(collection(db, "feedback"));
    data = snap.docs.map(d => d.data());
  } catch (err) {
    console.error(err);
    const local = localStorage.getItem("canteenFeedbackData");
    data = local ? JSON.parse(local) : [];
  }

  if (!data.length) {
    dash.innerHTML = "<h3>No feedback yet</h3>";
    return;
  }

  let cleanTotal = 0;
  let interiorTotal = 0;
  let foodTotal = 0;
  let foodCount = 0;

  data.forEach((item) => {
    const cleanValue = Number(item.clean || (item.ratings ? item.ratings[0] : 0) || 0);
    const interiorValue = Number(item.interior || (item.ratings ? item.ratings[1] : 0) || 0);
    cleanTotal += cleanValue;
    interiorTotal += interiorValue;
    const foodArray = item.foodRatings || (item.ratings ? item.ratings.slice(2) : []);
    foodArray.forEach((r) => { foodTotal += Number(r || 0); foodCount += 1; });
  });

  const avgClean = (cleanTotal / data.length).toFixed(1);
  const avgInterior = (interiorTotal / data.length).toFixed(1);
  const avgFood = foodCount ? (foodTotal / foodCount).toFixed(1) : "0.0";

  let html = `<div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:20px;"><div style="background:white;color:black;padding:12px;border-radius:10px;"><h3>Total Feedback</h3><p style="font-size:24px">${data.length}</p></div><div style="background:white;color:black;padding:12px;border-radius:10px;"><h3>Avg Clean</h3><p style="font-size:24px">${avgClean} ⭐</p></div><div style="background:white;color:black;padding:12px;border-radius:10px;"><h3>Avg Interior</h3><p style="font-size:24px">${avgInterior} ⭐</p></div><div style="background:white;color:black;padding:12px;border-radius:10px;"><h3>Avg Food</h3><p style="font-size:24px">${avgFood} ⭐</p></div></div><table style="width:100%;border-collapse:collapse;background:white;color:black;"><tr><th style="border:1px solid #ccc;padding:8px;">Name</th><th style="border:1px solid #ccc;padding:8px;">Role</th><th style="border:1px solid #ccc;padding:8px;">Comment</th></tr>`;
  data.forEach((item) => {
    html += `<tr><td style="border:1px solid #ccc;padding:8px;">${item.name || "-"}</td><td style="border:1px solid #ccc;padding:8px;">${item.role || "-"}</td><td style="border:1px solid #ccc;padding:8px;">${item.comment || "-"}</td></tr>`;
  });
  html += "</table>";

  dash.innerHTML = html;
}

function showLoggedInUI() {
  document.getElementById("loginSection").style.display = "none";
  document.getElementById("dashboardContent").style.display = "block";
  document.getElementById("dashboardFooter").style.display = "block";
  renderDashboard();
}

function showLoginUI() {
  document.getElementById("loginSection").style.display = "block";
  document.getElementById("dashboardContent").style.display = "none";
  document.getElementById("dashboardFooter").style.display = "none";
}

const ADMIN_USER = "Admin";
const ADMIN_PASS = "Admin@123";
const authKey = "dashboardLoggedIn";

function checkAuth() {
  return sessionStorage.getItem(authKey) === "true";
}

function login() {
  const username = document.getElementById("usernameInput").value.trim();
  const password = document.getElementById("passwordInput").value;
  const message = document.getElementById("loginMessage");

  if (username === ADMIN_USER && password === ADMIN_PASS) {
    sessionStorage.setItem(authKey, "true");
    message.style.color = "#8ef58e";
    message.textContent = "Login successful. Loading dashboard...";
    showLoggedInUI();
  } else {
    message.style.color = "#ffcccb";
    message.textContent = "Invalid credentials. Please try again.";
  }
}

function logout() {
  sessionStorage.removeItem(authKey);
  showLoginUI();
  document.getElementById("loginMessage").textContent = "Logged out successfully.";
}

const loginButton = document.getElementById("loginButton");
loginButton.addEventListener("click", login);

const logoutButton = document.getElementById("logoutButton");
logoutButton.addEventListener("click", logout);

if (checkAuth()) {
  showLoggedInUI();
} else {
  showLoginUI();
}

function applyThemeFromStorage() {
  const isDark = localStorage.getItem('theme') !== 'light';
  document.body.classList.toggle('dark-mode', isDark);
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = isDark ? 'Light Mode' : 'Dark Mode';
}
function toggleThemeFromStorage() {
  const current = localStorage.getItem('theme') || 'dark';
  localStorage.setItem('theme', current === 'dark' ? 'light' : 'dark');
  applyThemeFromStorage();
}
document.addEventListener('DOMContentLoaded', () => {
  applyThemeFromStorage();
  const btn = document.getElementById('themeToggle');
  if (btn) btn.addEventListener('click', toggleThemeFromStorage);
});
</script>
</body>
</html>
